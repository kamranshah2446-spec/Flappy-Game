name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Prepare Game Folder
        run: |
          mkdir -p www
          cp index.html www/
          
      - name: Install Android Tools
        run: |
          npm install @capacitor/cli @capacitor/core @capacitor/android
          npx cap init "MyGame" "com.myname.game" --web-dir www
          npx cap add android
          
      - name: Force Version Alignment
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          sed -i 's/sourceCompatibility = .*/sourceCompatibility = JavaVersion.VERSION_21/' android/app/build.gradle
          sed -i 's/targetCompatibility = .*/targetCompatibility = JavaVersion.VERSION_21/' android/app/build.gradle

      - name: Final Build
        run: |
          npx cap copy android
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace
          
      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: game-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
